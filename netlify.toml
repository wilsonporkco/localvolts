[build]
  functions = "netlify/functions"
  publish   = "."

# ── Scheduled function: check prices every 30 minutes ─────────────────────
[functions."price-alert"]
  schedule = "*/30 * * * *"

# ── Node version ──────────────────────────────────────────────────────────
[functions]
  node_bundler = "esbuild"
