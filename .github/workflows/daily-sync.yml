name: Localvolts sync

on:
  schedule:
    # Run every 30 minutes — captures intervals as they become actuals
    - cron: '*/30 * * * *'
  workflow_dispatch:
    inputs:
      hours_back:
        description: 'Hours of history to fetch (0=default fetch, max 72 for historical)'
        required: false
        default: '0'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sync
        env:
          LV_API_KEY:    ${{ secrets.LV_API_KEY }}
          LV_PARTNER:    ${{ secrets.LV_PARTNER }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          LV_NMI:        "*"
          LV_HOURS_BACK: ${{ github.event.inputs.hours_back || '0' }}
        run: python scripts/sync.py

      - name: Report status
        if: always()
        run: echo "Sync completed at $(date -u)"
