name: Localvolts sync

on:
  schedule:
    # Regular sync every 30 minutes — captures intervals as they become actuals
    - cron: '*/30 * * * *'
    # Daily backfill at 6 AM UTC (4 PM AEST) — re-fetches last 3 days to replace
    # Exp/Fcst estimates with Act quality data as NEM settlement completes
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      hours_back:
        description: 'Hours of history to fetch (0=default fetch, max 72 for historical)'
        required: false
        default: '0'

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine mode
        id: mode
        run: |
          # If triggered by the 6 AM daily cron, run a 72-hour backfill
          # so that settled Act data overwrites stale Exp/Fcst estimates
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "0 6 * * *" ]; then
            echo "hours_back=72" >> $GITHUB_OUTPUT
            echo "Running daily 72-hour backfill to collect settled actuals"
          else
            echo "hours_back=${{ github.event.inputs.hours_back || '0' }}" >> $GITHUB_OUTPUT
            echo "Running regular sync"
          fi

      - name: Run sync
        env:
          LV_API_KEY:    ${{ secrets.LV_API_KEY }}
          LV_PARTNER:    ${{ secrets.LV_PARTNER }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          LV_NMI:        "*"
          LV_HOURS_BACK: ${{ steps.mode.outputs.hours_back }}
        run: python scripts/sync.py

      - name: Report status
        if: always()
        run: echo "Sync completed at $(date -u) — mode hours_back=${{ steps.mode.outputs.hours_back }}"
