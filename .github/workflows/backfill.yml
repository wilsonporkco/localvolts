name: Localvolts backfill

on:
  schedule:
    # Every 5 minutes — keeps all NMIs current and converts Fcst->Exp->Act
    # as NEM settlement data arrives
    - cron: '*/5 * * * *'
  workflow_run:
    # Also fire after each live sync completes — more reliable than cron alone
    workflows: ["Localvolts live sync"]
    types: [completed]
  workflow_dispatch:
    inputs:
      hours_back:
        description: 'Hours of history to fetch (default 168 = 7 days, covers NEM settlement lag)'
        required: false
        default: '168'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run backfill (168hr = 7 days, covers full NEM settlement window)
        env:
          LV_ACCOUNTS:   ${{ secrets.LV_ACCOUNTS }}
          LV_API_KEY:    ${{ secrets.LV_API_KEY }}
          LV_PARTNER:    ${{ secrets.LV_PARTNER }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          LV_NMI:        "*"
          LV_HOURS_BACK: ${{ github.event.inputs.hours_back || '168' }}
        run: python scripts/sync.py
