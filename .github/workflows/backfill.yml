name: Localvolts daily backfill

on:
  schedule:
    # 0 AM UTC = 6 AM AEST — re-fetches last 3 days so that NEM-settled
    # Act data overwrites any stale Fcst/Exp estimates in the DB
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      hours_back:
        description: 'Hours of history to fetch (default 96 = 4 days, covers 72h API limit)'
        required: false
        default: '96'

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run backfill (72hr = 3 AEST days)
        env:
          LV_API_KEY:    ${{ secrets.LV_API_KEY }}
          LV_PARTNER:    ${{ secrets.LV_PARTNER }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          LV_NMI:        "*"
          LV_HOURS_BACK: ${{ github.event.inputs.hours_back || '96' }}
        run: python scripts/sync.py
